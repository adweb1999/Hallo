name: Build OneStateLogin Tweak

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: macos-latest   # أو macos-14 إذا أردت

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Theos
        uses: Randomblock1/theos-action@v1
        with:
          theos-dir: '$GITHUB_WORKSPACE/theos'
          # يمكنك إضافة cache لتسريع العملية في المرات القادمة

      - name: Build the Tweak
        run: |
          cd $GITHUB_WORKSPACE
          make clean
          make package FINALPACKAGE=1

      - name: Upload .deb Package
        uses: actions/upload-artifact@v4
        with:
          name: OneStateLogin-Deb
          path: packages/*.deb
          retention-days: 30

      - name: Upload dylib (optional)
        uses: actions/upload-artifact@v4
        with:
          name: OneStateLogin-dylib
          path: obj/*.dylib
          retention-days: 7
